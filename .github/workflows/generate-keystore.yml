name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore bloom-sort.jks \
            -alias key0 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass BloomSort2024 \
            -keypass BloomSort2024 \
            -dname "CN=Bloom Sort, OU=Games, O=lyacosta, L=City, S=State, C=US"

      - name: Convert to base64
        run: |
          base64 bloom-sort.jks > keystore-base64.txt
          cat keystore-base64.txt

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            bloom-sort.jks
            keystore-base64.txt
