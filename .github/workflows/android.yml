name: Build and Deploy Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6.1.0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Remove Android folder
        run: rm -rf android

      - name: Generate Android project
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force versionCode and targetSdk in build.gradle
        run: |
          echo "Before patch:"
          grep -E "versionCode|versionName|targetSdk|compileSdk" android/app/build.gradle
          python3 -c "
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          content = re.sub(r'versionCode\s+\d+', 'versionCode 3', content)
          content = re.sub(r'versionName\s+[\"\']\S+[\"\']', 'versionName \"1.0.0\"', content)
          content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 35', content)
          content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 35', content)
          content = re.sub(r'compileSdk\s+\d+', 'compileSdk 35', content)
          content = re.sub(r'targetSdk\s+\d+', 'targetSdk 35', content)
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          "
          echo "After patch:"
          grep -E "versionCode|versionName|targetSdk|compileSdk" android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/bloom-sort.jks

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease -Pandroid.injected.signing.store.file=$(pwd)/app/bloom-sort.jks -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bloom-sort-release
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.lyacosta.bloomsort
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
