name: Build and Deploy Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:

      # ── 1. GET THE CODE ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. NODE & DEPENDENCIES ───────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6.1.0

      # ── 3. ANDROID BUILD TOOLS ───────────────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. GENERATE ANDROID PROJECT FRESH ───────────────────────────────
      - name: Remove old Android folder
        run: rm -rf android

      - name: Generate Android project
        run: npx cap add android

      - name: Sync web assets into Android
        run: npx cap sync android

      # ── 5. PATCH AndroidManifest.xml (AdMob App ID + AD_ID permission) ──
      - name: Patch AndroidManifest.xml
        run: |
          python3 << 'PYEOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          if 'com.google.android.gms.ads.APPLICATION_ID' not in content:
              admob = """
          <meta-data
              android:name="com.google.android.gms.ads.APPLICATION_ID"
              android:value="ca-app-pub-4027849390139262~4474369537" />
          <meta-data
              android:name="com.google.android.gms.ads.DELAY_APP_MEASUREMENT_INIT"
              android:value="true" />"""
              content = content.replace('</application>', admob + '\n    </application>')
              print("AdMob meta-data injected")
          else:
              print("AdMob meta-data already present")

          if 'AD_ID' not in content:
              ad_id = '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>'
              content = content.replace('</manifest>', ad_id + '\n</manifest>')
              print("AD_ID permission injected")

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("Final AndroidManifest.xml:")
          print(content)
          PYEOF

      # ── 6. PATCH SDK VERSIONS AND versionCode ────────────────────────────
      - name: Patch variables.gradle and build.gradle
        run: |
          python3 << 'PYEOF'
          import re, os

          vfile = 'android/variables.gradle'
          if os.path.exists(vfile):
              with open(vfile, 'r') as f:
                  v = f.read()
              print("variables.gradle BEFORE:\n", v)
              v = re.sub(r'(compileSdkVersion\s*=\s*)\d+', r'\g<1>35', v)
              v = re.sub(r'(targetSdkVersion\s*=\s*)\d+', r'\g<1>35', v)
              v = re.sub(r'(compileSdk\s*=\s*)\d+', r'\g<1>35', v)
              v = re.sub(r'(targetSdk\s*=\s*)\d+', r'\g<1>35', v)
              with open(vfile, 'w') as f:
                  f.write(v)
              print("variables.gradle AFTER:\n", v)

          bfile = 'android/app/build.gradle'
          with open(bfile, 'r') as f:
              b = f.read()
          print("build.gradle BEFORE:\n", b)
          b = re.sub(r'(versionCode\s+)\d+', r'\g<1>9', b)
          b = re.sub(r'(versionName\s+")[^"]*"', r'\g<1>1.0.1"', b)
          b = re.sub(r'(compileSdkVersion\s+)\d+', r'\g<1>35', b)
          b = re.sub(r'(compileSdk\s+)\d+', r'\g<1>35', b)
          b = re.sub(r'(targetSdkVersion\s+)\d+', r'\g<1>35', b)
          b = re.sub(r'(targetSdk\s+)\d+', r'\g<1>35', b)
          with open(bfile, 'w') as f:
              f.write(b)
          print("build.gradle AFTER:\n", b)
          PYEOF

      # ── 7. BUILD ─────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/bloom-sort.jks
          ls -la android/app/bloom-sort.jks

      - name: Build release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/bloom-sort.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── 8. SAVE AND UPLOAD ───────────────────────────────────────────────
      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bloom-sort-release
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.lyacosta.bloomsort
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
